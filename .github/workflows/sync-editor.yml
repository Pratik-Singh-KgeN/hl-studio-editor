name: Sync editor from upstream

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream repository
        run: |
          git remote add upstream https://github.com/HumanSignal/label-studio.git || true
          git fetch upstream --tags --prune

      - name: Create subtree split branch
        run: |
          UPSTREAM_SUBPATH="web/libs/editor"
          UPSTREAM_BRANCH="develop"

          echo "Fetching upstream branch..."
          git fetch upstream $UPSTREAM_BRANCH

          echo "Checking out upstream commit..."
          git checkout --detach FETCH_HEAD

          echo "Cleaning previous branch if exists..."
          git branch -D editor-sync-temp || true

          echo "Creating subtree split..."
          git subtree split --prefix="$UPSTREAM_SUBPATH" -b editor-sync-temp

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: editor-sync-temp
          title: "Sync editor from upstream"
          body: |
            Automated sync from upstream repository.

            Upstream repository:
            https://github.com/HumanSignal/label-studio

            Extracted folder:
            web/libs/editor

            Generated automatically via GitHub Actions.
          labels: |
            automated
            upstream-sync